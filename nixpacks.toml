[phases.setup]
nixPkgs = ["python312", "nodejs_20"]

[phases.install]
cmds = [
  "python3 -m venv /opt/venv",
  "/opt/venv/bin/pip install -r backend/requirements.txt",
  "npm --prefix frontend install"
]

[phases.build]
cmds = [
  "npm --prefix frontend run build -- --outDir ../backend/dist"
]

[start]
cmd = "cd backend && /opt/venv/bin/uvicorn main:app --host 0.0.0.0 --port $PORT"
